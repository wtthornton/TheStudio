name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Bandit security scan
        run: uv run bandit -r src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: |
          uv run python -m pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -x -q

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: thestudio
          POSTGRES_PASSWORD: thestudio_dev
          POSTGRES_DB: thestudio
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U thestudio"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run migrations
        env:
          THESTUDIO_DATABASE_URL: "postgresql+asyncpg://thestudio:thestudio_dev@localhost:5434/thestudio"
          THESTUDIO_STORE_BACKEND: postgres
          THESTUDIO_ENCRYPTION_KEY: "hWaGRA3AtIn5jP9TYc3Vu56PS9JQHkFpcekh9PWg7Ac="
        run: uv run python -m src.db.run_migrations

      - name: Run integration tests
        env:
          THESTUDIO_DATABASE_URL: "postgresql+asyncpg://thestudio:thestudio_dev@localhost:5434/thestudio"
          THESTUDIO_STORE_BACKEND: postgres
          THESTUDIO_ENCRYPTION_KEY: "hWaGRA3AtIn5jP9TYc3Vu56PS9JQHkFpcekh9PWg7Ac="
        run: |
          uv run python -m pytest tests/integration/ \
            -m integration \
            -x -q --timeout=60

  docker-smoke:
    name: Docker Stack Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: docker-smoke-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Build Docker image
        run: docker compose -f docker-compose.dev.yml build

      - name: Start Docker Compose stack
        run: docker compose -f docker-compose.dev.yml -p thestudio-smoke up -d

      - name: Wait for stack readiness
        run: uv run python scripts/wait_for_stack.py --timeout 120

      - name: Run Docker smoke tests
        run: |
          uv run python -m pytest tests/docker/ \
            -m docker \
            -x -q --timeout=120

      - name: Collect container logs
        if: always()
        run: docker compose -f docker-compose.dev.yml -p thestudio-smoke logs --no-color > docker-logs.txt 2>&1

      - name: Upload container logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-compose-logs
          path: docker-logs.txt
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.dev.yml -p thestudio-smoke down -v

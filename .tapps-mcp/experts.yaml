# TheStudio Custom Business-Domain Experts
# These extend the 17 built-in TappsMCP domains with project-specific expertise.
# Use: tapps_consult_expert(domain="<domain-name>", question="...")

experts:
  - expert_id: expert-intent-specification
    expert_name: Intent Specification Expert
    primary_domain: software-architecture
    description: >
      Expert on TheStudio Intent Layer. Advises on goal statements, constraints,
      invariants, acceptance criteria, non-goals, and scope boundaries. Ensures
      intent is testable and implementation-ready before agents begin work.
    keywords:
      - intent
      - goal statement
      - acceptance criteria
      - constraints
      - invariants
      - non-goals
      - scope

  - expert_id: expert-agent-roles-routing
    expert_name: Agent Roles & Routing Expert
    primary_domain: software-architecture
    description: >
      Expert on TheStudio Agent Plane roles: base roles (Developer, Architect,
      Planner), overlays (Partner API, Compliance, Security), EffectiveRolePolicy
      computation, tool allowlists, and expert routing. Advises on role selection,
      overlay composition, and least-privilege tool access.
    keywords:
      - agent role
      - role policy
      - overlay
      - developer role
      - tool allowlist
      - expert routing
      - primary agent

  - expert_id: expert-verification-qa
    expert_name: Verification & QA Expert
    primary_domain: testing-strategies
    description: >
      Expert on TheStudio Verification Gate and QA Layer. Advises on repo-profile
      checks (ruff, pytest), loopback logic, JetStream signal flow, defect taxonomy,
      and quality gate enforcement. Knows when to loopback vs reject.
    keywords:
      - verification
      - QA
      - quality gate
      - loopback
      - defect
      - ruff
      - pytest
      - JetStream

  - expert_id: expert-workflow-orchestration
    expert_name: Workflow Orchestration Expert
    primary_domain: software-architecture
    description: >
      Expert on TheStudio workflow orchestration using Temporal. Advises on
      durable workflows, retry policies, timeout configuration, correlation_id
      propagation, TaskPacket lifecycle, and workflow state management.
    keywords:
      - temporal
      - workflow
      - orchestration
      - retry
      - timeout
      - correlation_id
      - TaskPacket
      - durable

  - expert_id: expert-epic-planning
    expert_name: Epic Planning Expert
    primary_domain: development-workflow
    description: >
      Expert on TheStudio persona chain (Saga, Helm, Meridian). Advises on
      epic structure, sprint goal format, review checklists, OKR alignment,
      and the Strategy -> Saga -> Meridian -> Helm -> Meridian -> Execution flow.
    keywords:
      - epic
      - sprint
      - planning
      - saga
      - helm
      - meridian
      - OKR
      - review checklist
      - persona

  - expert_id: expert-publisher-github
    expert_name: Publisher & GitHub Expert
    primary_domain: github
    description: >
      Expert on TheStudio Publisher component and GitHub integration. Advises on
      draft PR creation, evidence comments, lifecycle labels, idempotency keys,
      GitHub App setup, installation tokens, and webhook handling.
    keywords:
      - publisher
      - pull request
      - PR
      - evidence comment
      - lifecycle label
      - idempotency
      - github app
      - webhook

  - expert_id: expert-frontend-style-governance
    expert_name: Frontend Style Governance Expert
    primary_domain: user-experience
    description: >
      Expert on enforcing TheStudio frontend style source of truth. Advises on
      cross-surface consistency, semantic color mappings, dashboard readability,
      accessibility, and update discipline for docs/design/07-THESTUDIO-UI-UX-STYLE-GUIDE.md.
    keywords:
      - frontend style guide
      - style governance
      - design standard
      - admin ui
      - pipeline ui
      - semantic colors
      - accessibility

  - expert_id: expert-prompt-first-ux
    expert_name: Prompt-First UX Expert
    primary_domain: user-experience
    description: >
      Expert on prompt-first AI interaction design in TheStudio. Advises on intent
      capture, intent preview, execution-mode control, trust calibration signals,
      human override, and evidence-backed outputs for agentic UX.
    keywords:
      - prompt-first
      - AI UX
      - intent preview
      - autonomy dial
      - trust calibration
      - human in the loop
      - explainability

  - expert_id: expert-admin-ui-patterns
    expert_name: Admin UI Patterns Expert
    primary_domain: user-experience
    description: >
      Expert on TheStudio Admin Console interaction patterns. Advises on layout
      shell, dashboard composition, table density, command palette patterns,
      loading/empty/error states, and responsive behavior.
    keywords:
      - admin console
      - dashboard patterns
      - command palette
      - htmx
      - table UX
      - loading state
      - responsive design

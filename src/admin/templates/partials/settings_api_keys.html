<div class="divide-y divide-gray-100" id="api-keys-card">
    {% for setting in settings %}
    <div class="px-6 py-4">
        <div class="flex items-center justify-between">
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-gray-700">{{ setting.key }}</span>
                    <span class="inline-block px-1.5 py-0.5 rounded text-xs font-medium
                        {% if setting.source == 'db' %}bg-green-100 text-green-700{% else %}bg-blue-100 text-blue-700{% endif %}">
                        {{ setting.source }}
                    </span>
                </div>
                <div class="mt-1 flex items-center gap-2" id="display-{{ setting.key }}">
                    {% if setting.value %}
                    <code class="text-sm text-gray-600 bg-gray-50 px-2 py-1 rounded">{{ setting.value }}</code>
                    {% else %}
                    <span class="text-sm text-gray-400 italic">Not configured</span>
                    {% endif %}
                </div>
            </div>
            <div class="flex items-center gap-2 ml-4">
                {% if setting.sensitive and setting.value %}
                <button class="text-xs text-blue-600 hover:text-blue-800"
                        hx-get="/admin/ui/partials/settings/api-keys/reveal/{{ setting.key }}"
                        hx-target="#display-{{ setting.key }}"
                        hx-swap="innerHTML">
                    Reveal
                </button>
                {% endif %}
                <button class="text-xs text-gray-500 hover:text-gray-700 border border-gray-300 rounded px-2 py-1"
                        onclick="document.getElementById('edit-{{ setting.key }}').classList.toggle('hidden');
                                 document.getElementById('display-{{ setting.key }}').classList.toggle('hidden');">
                    Edit
                </button>
            </div>
        </div>
        <!-- Inline Edit Form (hidden by default) -->
        <div id="edit-{{ setting.key }}" class="hidden mt-3">
            <form hx-post="/admin/ui/partials/settings/api-keys"
                  hx-target="#api-keys-card"
                  hx-swap="outerHTML"
                  hx-confirm="Are you sure you want to update this API key?">
                <input type="hidden" name="key" value="{{ setting.key }}">
                <div class="flex items-center gap-2">
                    <input type="text" name="value"
                           placeholder="Enter new value"
                           class="flex-1 text-sm border border-gray-300 rounded px-3 py-1.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <button type="submit"
                            class="text-xs bg-blue-600 text-white rounded px-3 py-1.5 hover:bg-blue-700">
                        Save
                    </button>
                    <button type="button"
                            class="text-xs text-gray-500 border border-gray-300 rounded px-3 py-1.5 hover:bg-gray-50"
                            onclick="document.getElementById('edit-{{ setting.key }}').classList.add('hidden');
                                     document.getElementById('display-{{ setting.key }}').classList.remove('hidden');">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
    {% endfor %}
    {% if flash %}
    <div class="px-6 py-3 bg-green-50 text-green-700 text-sm border-t border-green-200 fade-in">
        {{ flash }}
    </div>
    {% endif %}
</div>

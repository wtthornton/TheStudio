<div class="divide-y divide-[var(--color-border-secondary)]" id="budget-controls-card">
    <div class="px-6 py-4">
        <form hx-post="/admin/ui/partials/settings/budget-controls"
              hx-target="#budget-controls-card"
              hx-swap="outerHTML">
            <div class="grid grid-cols-3 gap-4">
                <!-- Observe Tier -->
                <div>
                    <label class="block text-sm font-medium text-[var(--color-text-tertiary)] mb-1">Observe Tier ($)</label>
                    <input type="number" name="observe" value="{{ budget_tiers.observe }}"
                           min="0.50" max="50.00" step="0.50"
                           class="w-full text-sm border border-[var(--color-border-primary)] rounded px-3 py-1.5 focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Suggest Tier -->
                <div>
                    <label class="block text-sm font-medium text-[var(--color-text-tertiary)] mb-1">Suggest Tier ($)</label>
                    <input type="number" name="suggest" value="{{ budget_tiers.suggest }}"
                           min="0.50" max="50.00" step="0.50"
                           class="w-full text-sm border border-[var(--color-border-primary)] rounded px-3 py-1.5 focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Execute Tier -->
                <div>
                    <label class="block text-sm font-medium text-[var(--color-text-tertiary)] mb-1">Execute Tier ($)</label>
                    <input type="number" name="execute" value="{{ budget_tiers.execute }}"
                           min="0.50" max="50.00" step="0.50"
                           class="w-full text-sm border border-[var(--color-border-primary)] rounded px-3 py-1.5 focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="mt-3 flex items-center justify-between">
                <span class="text-xs text-[var(--color-text-secondary)]">
                    Source:
                    <span class="inline-block px-1.5 py-0.5 rounded text-xs font-medium
                        {% if source == 'db' %}bg-green-100 text-green-700{% else %}bg-blue-100 text-blue-700{% endif %}">
                        {{ source }}
                    </span>
                    {% if not routing_enabled %}
                    &middot; <span class="text-amber-600">Cost routing is disabled &mdash; defaults apply</span>
                    {% endif %}
                </span>
                <button type="submit" class="text-sm bg-[var(--color-interactive-primary)] text-white rounded px-4 py-2 hover:bg-[var(--color-interactive-hover)]">
                    Save Budget Caps
                </button>
            </div>
        </form>
    </div>
    {% if error %}
    <div class="px-6 py-3 bg-red-50 text-red-700 text-sm border-t border-red-200 fade-in">{{ error }}</div>
    {% endif %}
    {% if flash %}
    <div class="px-6 py-3 bg-green-50 text-green-700 text-sm border-t border-green-200 fade-in">{{ flash }}</div>
    {% endif %}
</div>

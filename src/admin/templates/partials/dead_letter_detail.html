<!-- Dead-letter detail partial — shows single event with raw payload -->
<div class="bg-white border border-gray-200 rounded-lg p-4 fade-in">
    <div class="flex justify-between items-start mb-4">
        <div>
            <h3 class="text-sm font-semibold">Dead-Letter Event {{ evt.id[:8] }}...</h3>
            <p class="text-xs text-gray-500 mt-1">Full ID: {{ evt.id }}</p>
        </div>
        <button class="text-xs text-gray-400 hover:text-gray-600"
                onclick="document.getElementById('dl-detail').innerHTML = ''">
            Close
        </button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4 text-sm">
        <div>
            <span class="text-gray-500">Failure Reason:</span>
            <span class="ml-2 text-red-600">{{ evt.failure_reason }}</span>
        </div>
        <div>
            <span class="text-gray-500">Attempts:</span>
            <span class="ml-2">{{ evt.attempt_count }}</span>
        </div>
        <div>
            <span class="text-gray-500">Created:</span>
            <span class="ml-2 text-xs">{{ evt.created_at }}</span>
        </div>
    </div>

    <div class="mb-4">
        <h4 class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">Raw Payload</h4>
        <pre class="bg-gray-50 border border-gray-200 rounded p-3 text-xs overflow-x-auto max-h-48">{{ evt.raw_payload }}</pre>
    </div>

    <div class="pt-2 border-t border-gray-200">
        <button class="px-3 py-1.5 text-xs font-medium bg-red-500 text-white rounded hover:bg-red-600"
                hx-delete="/admin/ui/partials/dead-letter/{{ evt.id }}"
                hx-target="#dl-detail" hx-swap="innerHTML"
                hx-confirm="Delete this dead-letter event?">
            Delete
        </button>
    </div>
</div>

{% extends "base.html" %}

{% block title %}Cost Dashboard{% endblock %}
{% block page_title %}Cost Dashboard{% endblock %}

{% block content %}
<div class="mb-4 flex items-center gap-2">
    <label class="text-sm text-gray-600 font-medium">Time window:</label>
    <button class="px-3 py-1 text-sm rounded border border-gray-300 hover:bg-gray-100"
            hx-get="/admin/ui/partials/cost-dashboard?window=24"
            hx-target="#cost-dashboard-content" hx-swap="innerHTML">24h</button>
    <button class="px-3 py-1 text-sm rounded border border-gray-300 hover:bg-gray-100"
            hx-get="/admin/ui/partials/cost-dashboard?window=168"
            hx-target="#cost-dashboard-content" hx-swap="innerHTML">7d</button>
    <button class="px-3 py-1 text-sm rounded border border-gray-300 hover:bg-gray-100"
            hx-get="/admin/ui/partials/cost-dashboard?window=720"
            hx-target="#cost-dashboard-content" hx-swap="innerHTML">30d</button>
</div>
<div id="cost-dashboard-content"
     data-admin-htmx-section="true"
     aria-label="Cost dashboard"
     hx-get="/admin/ui/partials/cost-dashboard?window=24"
     hx-trigger="load"
     hx-swap="innerHTML">
    <div class="text-center py-12 text-gray-400" role="status" aria-live="polite">
        <p class="text-sm">Loading cost dashboard...</p>
    </div>
</div>

<!-- Budget Utilization Widget (Story 32.14) -->
<div id="budget-utilization-content"
     class="mt-6"
     data-admin-htmx-section="true"
     aria-label="Budget utilization"
     hx-get="/admin/ui/partials/budget-utilization?window=24"
     hx-trigger="load"
     hx-swap="innerHTML">
    <div class="text-center py-6 text-gray-400" role="status" aria-live="polite">
        <p class="text-sm">Loading budget utilization...</p>
    </div>
</div>
{% endblock %}

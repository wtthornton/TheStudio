{% extends "base.html" %}
{% from "components/status_badge.html" import tier_badge, health_badge, repo_status_badge %}

{% block title %}Repo Detail{% endblock %}
{% block page_title %}Repo Detail{% endblock %}

{% block content %}
<div id="repo-detail-content"
     data-admin-htmx-section="true"
     aria-label="Repository detail"
     hx-get="/admin/ui/partials/repo/{{ repo_id }}"
     hx-trigger="load"
     hx-swap="innerHTML"
     hx-headers='{"X-User-ID": "{{ current_user_id }}"}'>
    <div class="text-center py-12 text-gray-400 text-sm" role="status" aria-live="polite">Loading repo...</div>
</div>
{% endblock %}

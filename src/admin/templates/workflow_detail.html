{% extends "base.html" %}
{% from "components/status_badge.html" import workflow_status_badge %}

{% block title %}Workflow Detail{% endblock %}
{% block page_title %}Workflow Detail{% endblock %}

{% block content %}
<div id="wf-detail-content"
     data-admin-htmx-section="true"
     aria-label="Workflow detail"
     hx-get="/admin/ui/partials/workflow/{{ workflow_id }}"
     hx-trigger="load"
     hx-swap="innerHTML"
     hx-headers='{"X-User-ID": "{{ current_user_id }}"}'>
    <div class="text-center py-12 text-[var(--color-text-secondary)] text-sm" role="status" aria-live="polite">Loading workflow...</div>
</div>
{% endblock %}

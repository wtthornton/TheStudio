{% extends "base.html" %}

{% block title %}Expert {{ expert.expert_id[:8] }}{% endblock %}
{% block page_title %}Expert Detail{% endblock %}

{% block content %}
<div id="expert-detail-content"
     data-admin-htmx-section="true"
     aria-label="Expert detail"
     hx-get="/admin/ui/partials/expert/{{ expert.expert_id }}"
     hx-trigger="load"
     hx-swap="innerHTML">
    <div class="text-center py-12 text-[var(--color-text-secondary)]" role="status" aria-live="polite">
        <p class="text-sm">Loading expert detail...</p>
    </div>
</div>
{% endblock %}

# Docker Compose for local development — TheStudio
# Usage: docker compose -f docker-compose.dev.yml up
#
# Starts: PostgreSQL, Temporal (dev server), NATS, and the TheStudio app.
# Health check: curl http://localhost:8000/healthz

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thestudio
      POSTGRES_PASSWORD: thestudio_dev
      POSTGRES_DB: thestudio
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thestudio"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: thestudio
      POSTGRES_PWD: thestudio_dev
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "-m", "8222"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      THESTUDIO_DATABASE_URL: "postgresql+asyncpg://thestudio:thestudio_dev@postgres:5432/thestudio"
      THESTUDIO_TEMPORAL_HOST: "temporal:7233"
      THESTUDIO_NATS_URL: "nats://nats:4222"
      THESTUDIO_STORE_BACKEND: "memory"
      THESTUDIO_LLM_PROVIDER: "mock"
      THESTUDIO_GITHUB_PROVIDER: "mock"
      THESTUDIO_WEBHOOK_SECRET: "test-webhook-secret"
      THESTUDIO_ENCRYPTION_KEY: "hWaGRA3AtIn5jP9TYc3Vu56PS9JQHkFpcekh9PWg7Ac="
      THESTUDIO_OTEL_EXPORTER: "console"
      # Projects v2 integration (Epic 29) — set in .env to enable
      THESTUDIO_PROJECTS_V2_ENABLED: "${THESTUDIO_PROJECTS_V2_ENABLED:-false}"
      THESTUDIO_PROJECTS_V2_OWNER: "${THESTUDIO_PROJECTS_V2_OWNER:-}"
      THESTUDIO_PROJECTS_V2_NUMBER: "${THESTUDIO_PROJECTS_V2_NUMBER:-0}"
      THESTUDIO_PROJECTS_V2_TOKEN: "${THESTUDIO_PROJECTS_V2_TOKEN:-}"
      # Meridian portfolio review (Epic 29) — set in .env to enable
      THESTUDIO_MERIDIAN_PORTFOLIO_ENABLED: "${THESTUDIO_MERIDIAN_PORTFOLIO_ENABLED:-false}"
      THESTUDIO_MERIDIAN_PORTFOLIO_GITHUB_ISSUE: "${THESTUDIO_MERIDIAN_PORTFOLIO_GITHUB_ISSUE:-false}"
      THESTUDIO_MERIDIAN_PORTFOLIO_REPO: "${THESTUDIO_MERIDIAN_PORTFOLIO_REPO:-}"
      # Preflight plan review gate (Epic 28) — set in .env to enable
      THESTUDIO_PREFLIGHT_ENABLED: "${THESTUDIO_PREFLIGHT_ENABLED:-false}"
      THESTUDIO_PREFLIGHT_TIERS: "${THESTUDIO_PREFLIGHT_TIERS:-[\"execute\"]}"
      # Approval auto-bypass (Story 30.14) — skip approval gate in dev
      THESTUDIO_APPROVAL_AUTO_BYPASS: "${THESTUDIO_APPROVAL_AUTO_BYPASS:-true}"
      # Container isolation (Epic 25) — set in .env to enable
      THESTUDIO_AGENT_ISOLATION: "${THESTUDIO_AGENT_ISOLATION:-process}"
      THESTUDIO_AGENT_ISOLATION_FALLBACK: "${THESTUDIO_AGENT_ISOLATION_FALLBACK:-{\"observe\":\"allow\",\"suggest\":\"allow\",\"execute\":\"deny\"}}"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/healthz'); assert r.status_code == 200"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - default
      - agent-net

# Agent network — restricted network for ephemeral agent containers.
# Agent containers connect ONLY to agent-net (no access to postgres,
# temporal, nats, or the app). Outbound HTTPS to GitHub is allowed.
networks:
  agent-net:
    driver: bridge
    internal: false  # Allows outbound internet (GitHub API, Anthropic API)
    labels:
      thestudio.role: "agent-isolation"

name: thestudio

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      THESTUDIO_DATABASE_URL: "postgresql+asyncpg://thestudio:thestudio_dev@postgres:5432/thestudio"
      THESTUDIO_STORE_BACKEND: "postgres"
      THESTUDIO_TEMPORAL_HOST: "temporal:7233"
      THESTUDIO_NATS_URL: "nats://nats:4222"
      THESTUDIO_ENCRYPTION_KEY: "${THESTUDIO_ENCRYPTION_KEY:?Set THESTUDIO_ENCRYPTION_KEY in .env}"
      THESTUDIO_LLM_PROVIDER: "${THESTUDIO_LLM_PROVIDER:-mock}"
      THESTUDIO_GITHUB_PROVIDER: "${THESTUDIO_GITHUB_PROVIDER:-mock}"
      THESTUDIO_ANTHROPIC_API_KEY: "${THESTUDIO_ANTHROPIC_API_KEY:-}"
      THESTUDIO_ANTHROPIC_AUTH_MODE: "${THESTUDIO_ANTHROPIC_AUTH_MODE:-auto}"
      THESTUDIO_ANTHROPIC_REFRESH_TOKEN: "${THESTUDIO_ANTHROPIC_REFRESH_TOKEN:-}"
      THESTUDIO_ANTHROPIC_OAUTH_CLIENT_ID: "${THESTUDIO_ANTHROPIC_OAUTH_CLIENT_ID:-9d1c250a-e61b-44d9-88ed-5944d1962f5e}"
      THESTUDIO_GITHUB_APP_ID: "${THESTUDIO_GITHUB_APP_ID:-}"
      THESTUDIO_GITHUB_PRIVATE_KEY_PATH: "${THESTUDIO_GITHUB_PRIVATE_KEY_PATH:-}"
      THESTUDIO_OTEL_EXPORTER: "${THESTUDIO_OTEL_EXPORTER:-console}"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thestudio
      POSTGRES_PASSWORD: thestudio_dev
      POSTGRES_DB: thestudio
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-temporal-db.sql:/docker-entrypoint-initdb.d/init-temporal-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thestudio"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.25
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=thestudio
      - POSTGRES_PWD=thestudio_dev
      - POSTGRES_SEEDS=postgres
      - DBNAME=temporal
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data

volumes:
  pgdata:
  natsdata:

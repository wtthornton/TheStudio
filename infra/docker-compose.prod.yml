# Project name isolates this stack from other production systems on the same host.
name: thestudio-prod

services:
  caddy:
    image: caddy:2.9-alpine
    # Host ports 9080/9443 so this stack can run alongside other systems using 80/443.
    # To use 80/443 exclusively, change to "80:80" and "443:443".
    ports:
      - "9080:80"
      - "9443:443"
    environment:
      ADMIN_USER: "${ADMIN_USER:-admin}"
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH:?Set ADMIN_PASSWORD_HASH in .env — run: docker run --rm caddy:2.9-alpine caddy hash-password --plaintext YOUR_PASSWORD}"
      # HTTPS feature flag: false = HTTP only (default), true = HTTPS with self-signed TLS
      THESTUDIO_HTTPS_ENABLED: "${THESTUDIO_HTTPS_ENABLED:-false}"
    entrypoint: ["/bin/sh", "/mnt/caddy/docker-entrypoint-caddy.sh"]
    volumes:
      - .:/mnt/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - thestudio-net

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      THESTUDIO_DATABASE_URL: "postgresql+asyncpg://thestudio:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/thestudio"
      THESTUDIO_STORE_BACKEND: "postgres"
      THESTUDIO_TEMPORAL_HOST: "temporal:7233"
      THESTUDIO_NATS_URL: "nats://nats:4222"
      THESTUDIO_ENCRYPTION_KEY: "${THESTUDIO_ENCRYPTION_KEY:?Set THESTUDIO_ENCRYPTION_KEY in .env}"
      THESTUDIO_LLM_PROVIDER: "${THESTUDIO_LLM_PROVIDER:-anthropic}"
      THESTUDIO_GITHUB_PROVIDER: "${THESTUDIO_GITHUB_PROVIDER:-real}"
      THESTUDIO_ANTHROPIC_API_KEY: "${THESTUDIO_ANTHROPIC_API_KEY:?Set THESTUDIO_ANTHROPIC_API_KEY}"
      THESTUDIO_ANTHROPIC_AUTH_MODE: "${THESTUDIO_ANTHROPIC_AUTH_MODE:-auto}"
      THESTUDIO_ANTHROPIC_REFRESH_TOKEN: "${THESTUDIO_ANTHROPIC_REFRESH_TOKEN:-}"
      THESTUDIO_ANTHROPIC_OAUTH_CLIENT_ID: "${THESTUDIO_ANTHROPIC_OAUTH_CLIENT_ID:-9d1c250a-e61b-44d9-88ed-5944d1962f5e}"
      THESTUDIO_GITHUB_APP_ID: "${THESTUDIO_GITHUB_APP_ID:-}"
      THESTUDIO_GITHUB_PRIVATE_KEY_PATH: "${THESTUDIO_GITHUB_PRIVATE_KEY_PATH:-}"
      THESTUDIO_WEBHOOK_SECRET: "${THESTUDIO_WEBHOOK_SECRET:-}"
      THESTUDIO_INTAKE_POLL_ENABLED: "${THESTUDIO_INTAKE_POLL_ENABLED:-false}"
      THESTUDIO_INTAKE_POLL_INTERVAL_MINUTES: "${THESTUDIO_INTAKE_POLL_INTERVAL_MINUTES:-10}"
      THESTUDIO_INTAKE_POLL_TOKEN: "${THESTUDIO_INTAKE_POLL_TOKEN:-}"
      THESTUDIO_OTEL_EXPORTER: "${THESTUDIO_OTEL_EXPORTER:-console}"
      # Approval auto-bypass (Story 30.14) — NEVER auto-bypass in production
      THESTUDIO_APPROVAL_AUTO_BYPASS: "${THESTUDIO_APPROVAL_AUTO_BYPASS:-false}"
      THESTUDIO_AGENT_ISOLATION: "${THESTUDIO_AGENT_ISOLATION:-process}"
      THESTUDIO_AGENT_ISOLATION_FALLBACK: "${THESTUDIO_AGENT_ISOLATION_FALLBACK:-{\"observe\":\"allow\",\"suggest\":\"allow\",\"execute\":\"deny\"}}"
      # Preflight plan review gate (Epic 28)
      THESTUDIO_PREFLIGHT_ENABLED: "${THESTUDIO_PREFLIGHT_ENABLED:-false}"
      THESTUDIO_PREFLIGHT_TIERS: "${THESTUDIO_PREFLIGHT_TIERS:-[\"execute\"]}"
      # Projects v2 integration (Epic 29)
      THESTUDIO_PROJECTS_V2_ENABLED: "${THESTUDIO_PROJECTS_V2_ENABLED:-false}"
      THESTUDIO_PROJECTS_V2_OWNER: "${THESTUDIO_PROJECTS_V2_OWNER:-}"
      THESTUDIO_PROJECTS_V2_NUMBER: "${THESTUDIO_PROJECTS_V2_NUMBER:-0}"
      THESTUDIO_PROJECTS_V2_TOKEN: "${THESTUDIO_PROJECTS_V2_TOKEN:-}"
      # Meridian portfolio review (Epic 29)
      THESTUDIO_MERIDIAN_PORTFOLIO_ENABLED: "${THESTUDIO_MERIDIAN_PORTFOLIO_ENABLED:-false}"
      THESTUDIO_MERIDIAN_PORTFOLIO_GITHUB_ISSUE: "${THESTUDIO_MERIDIAN_PORTFOLIO_GITHUB_ISSUE:-false}"
      THESTUDIO_MERIDIAN_PORTFOLIO_REPO: "${THESTUDIO_MERIDIAN_PORTFOLIO_REPO:-}"
      # Per-agent LLM toggles (Epic 23)
      THESTUDIO_AGENT_LLM_ENABLED: '{"primary_agent":true,"developer":true,"intake_agent":true,"context_agent":true,"intent_agent":true,"router_agent":true,"recruiter_agent":true,"assembler_agent":true,"qa_agent":true,"preflight_agent":true}'
      # Cost optimization (Epic 32)
      THESTUDIO_COST_OPTIMIZATION_ROUTING_ENABLED: "${THESTUDIO_COST_OPTIMIZATION_ROUTING_ENABLED:-false}"
      THESTUDIO_COST_OPTIMIZATION_CACHING_ENABLED: "${THESTUDIO_COST_OPTIMIZATION_CACHING_ENABLED:-false}"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./github-app.pem:/app/infra/github-app.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - thestudio-net
      - agent-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thestudio
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}"
      POSTGRES_DB: thestudio
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-temporal-db.sql:/docker-entrypoint-initdb.d/init-temporal-db.sql
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thestudio"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - thestudio-net

  temporal-migrations:
    image: temporalio/admin-tools:1.26.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres
      - DB_PORT=5432
      - POSTGRES_USER=thestudio
      - POSTGRES_PWD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgres
    entrypoint:
      - sh
      - -c
      - |
        set -e
        TOOL="temporal-sql-tool --plugin postgres12 --ep postgres --port 5432 --user thestudio --password $$POSTGRES_PWD"

        echo "Creating temporal database (if not exists)..."
        $$TOOL --database temporal create-database --defaultdb thestudio || true

        echo "Setting up temporal schema..."
        $$TOOL --database temporal setup-schema -v 0.0 || true

        echo "Migrating temporal schema..."
        $$TOOL --database temporal update-schema \
          -d /etc/temporal/schema/postgresql/v12/temporal/versioned

        echo "Creating temporal_visibility database (if not exists)..."
        $$TOOL --database temporal_visibility create-database --defaultdb thestudio || true

        echo "Setting up visibility schema..."
        $$TOOL --database temporal_visibility setup-schema -v 0.0 || true

        echo "Migrating visibility schema..."
        $$TOOL --database temporal_visibility update-schema \
          -d /etc/temporal/schema/postgresql/v12/visibility/versioned

        echo "Temporal schema ready."
    restart: "no"
    networks:
      - thestudio-net

  temporal:
    image: temporalio/server:1.26.2
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=thestudio
      - POSTGRES_PWD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgres
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
    depends_on:
      postgres:
        condition: service_healthy
      temporal-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - thestudio-net

  backup:
    image: postgres:16-alpine
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Backup sidecar starting — daily at 02:00 UTC"
        # Install crond schedule
        echo "0 2 * * * /scripts/backup-db.sh --sidecar >> /proc/1/fd/1 2>&1" | crontab -
        # Run crond in foreground
        crond -f -l 2
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}"
    volumes:
      - ./backup-db.sh:/scripts/backup-db.sh:ro
      - ./backups:/scripts/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - thestudio-net

  pg-proxy:
    image: alpine/socat
    command: "tcp-listen:5432,fork,reuseaddr tcp-connect:postgres:5432"
    # Bind to localhost only — prevents external access to the database.
    # Remove this service entirely if remote DB access is not needed.
    ports:
      - "127.0.0.1:5434:5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - thestudio-net

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data", "-m", "8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - thestudio-net

networks:
  thestudio-net:
    driver: bridge
  # Agent network — isolated network for ephemeral agent containers.
  # Agent containers connect ONLY to agent-net. They cannot reach
  # postgres (5432), temporal (7233), nats (4222), or the app (8000).
  # Outbound HTTPS to GitHub and Anthropic API is allowed.
  agent-net:
    driver: bridge
    internal: false
    labels:
      thestudio.role: "agent-isolation"

volumes:
  pgdata:
  natsdata:
  caddy_data:
  caddy_config:
